packages:
  - '.'
allowBuilds:
  '@nestjs/core': set this to true or false
  '@openapitools/openapi-generator-cli': set this to true or false
  '@parcel/watcher': set this to true or false
  core-js: set this to true or false
  esbuild: set this to true or false
  lmdb: set this to true or false
  msgpackr-extract: set this to true or false

# 悪意のあるリリースは1週間以内に発見され、レジストリから削除される為
# config = 7 day x 24h x 60 min
minimumReleaseAge: 10080
# Angular 22 へのアップグレードで必要なパッケージは release age 未満のため除外
minimumReleaseAgeExclude:
  - '@angular/*'
  - '@angular-devkit/*'
  - '@inquirer/*'
  - '@jsonjoy.com/*'
  - '@ngtools/*'
  - '@schematics/*'
  - baseline-browser-mapping
  - electron-to-chromium
  - enhanced-resolve
  - memfs
  - node-releases
  - '@nestjs/*'
  - '@openapitools/openapi-generator-cli'
  - '@types/node'
  - get-uri
  - '*proxy-agent*'
